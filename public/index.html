<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Video Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Space+Mono:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=3" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">◐</div>
        <div class="brand-text">
          <div class="brand-name">AI&nbsp;VIDEO&nbsp;STUDIO</div>
          <div class="brand-sub" id="modelLine">loading…</div>
        </div>
      </div>

      <button class="new-project-btn" id="newProjectBtn">＋ New project</button>

      <div class="project-list" id="projectList"></div>

      <div class="sidebar-foot">
        <span id="keyStatus" class="key-status"></span>
      </div>
    </aside>

    <!-- Main -->
    <main class="main" id="main">
      <div class="empty-state" id="emptyState">
        <div class="empty-mark">◐</div>
        <h1>Your production cockpit</h1>
        <p>Create a project to start generating Nano Banana frames, Kling motion prompts, and managing your renders — all in one place.</p>
        <button class="new-project-btn big" id="newProjectBtn2">＋ Create your first project</button>
      </div>

      <div class="workspace hidden" id="workspace">
        <header class="ws-header">
          <div class="ws-title">
            <input id="projectNameInput" class="project-name-input" />
            <span class="ws-meta" id="wsMeta"></span>
          </div>
          <div class="ws-tabs" id="wsTabs">
            <button class="tab active" data-tab="nb-frames">NB&nbsp;Frames</button>
            <button class="tab" data-tab="kling">Kling</button>
            <button class="tab" data-tab="nb-advisor">NB&nbsp;Advisor</button>
            <button class="tab" data-tab="generate">Nano&nbsp;Banana&nbsp;2</button>
            <button class="tab" data-tab="library">Library</button>
          </div>
        </header>

        <section class="ws-body" id="wsBody"><!-- panels injected --></section>
      </div>
    </main>
  </div>

  <!-- Lightbox -->
  <div class="lightbox hidden" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <button class="lightbox-nav prev hidden" id="lightboxPrev" title="Previous (←)">‹</button>
    <img id="lightboxImg" src="" alt="" />
    <button class="lightbox-nav next hidden" id="lightboxNext" title="Next (→)">›</button>
    <div class="lightbox-caption" id="lightboxCaption"></div>
    <div class="lightbox-count" id="lightboxCount"></div>
  </div>

  <script src="/app.js?v=3" type="module"></script>
</body>
</html>
