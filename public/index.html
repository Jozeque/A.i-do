<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Video Studio</title>
  <link rel="icon" href="/favicon.svg?v=1" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Space+Mono:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=21" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">◐</div>
        <div class="brand-text">
          <div class="brand-name">AI&nbsp;VIDEO&nbsp;STUDIO</div>
          <div class="brand-sub" id="modelLine">loading…</div>
        </div>
      </div>

      <button class="new-project-btn" id="newProjectBtn">＋ New project</button>

      <div class="project-list" id="projectList"></div>

      <div class="sidebar-foot">
        <button class="sidebar-nav-btn" id="showcaseBtn">🎬&nbsp;Showcase</button>
        <button class="sidebar-nav-btn" id="expensesBtn">💰&nbsp;Expenses</button>
        <span id="keyStatus" class="key-status"></span>
      </div>
    </aside>

    <!-- Main -->
    <main class="main" id="main">
      <div class="empty-state" id="emptyState">
        <div class="empty-mark">◐</div>
        <h1>Your production cockpit</h1>
        <p>Create a project to start generating Nano Banana frames, Kling motion prompts, and managing your renders — all in one place.</p>
        <button class="new-project-btn big" id="newProjectBtn2">＋ Create your first project</button>
      </div>

      <div class="workspace hidden" id="workspace">
        <header class="ws-header">
          <div class="ws-title">
            <input id="projectNameInput" class="project-name-input" />
            <span class="ws-meta" id="wsMeta"></span>
          </div>
          <div class="ws-tabs" id="wsTabs">
            <button class="tab active" data-tab="nb-frames">NB&nbsp;Frames</button>
            <button class="tab" data-tab="characters">Characters</button>
            <button class="tab" data-tab="kling">Kling</button>
            <button class="tab" data-tab="kling-advisor">Kling&nbsp;Advisor</button>
            <button class="tab" data-tab="nb-advisor">NB&nbsp;Advisor</button>
            <button class="tab" data-tab="gpt-advisor">GPT&nbsp;Advisor</button>
            <button class="tab" data-tab="swap">Swap&nbsp;/&nbsp;Edit</button>
            <button class="tab" data-tab="generate">Nano&nbsp;Banana&nbsp;2</button>
            <button class="tab" data-tab="library">Library</button>
          </div>
        </header>

        <section class="ws-body" id="wsBody"><!-- panels injected --></section>
      </div>

      <!-- Global Showcase admin (uploads that power the public landing page) -->
      <div class="showcase-view hidden" id="showcaseView"></div>

      <!-- Global Expenses view (running Claude + Nano Banana cost, by month/week) -->
      <div class="showcase-view hidden" id="expensesView"></div>
    </main>
  </div>

  <!-- Lightbox -->
  <div class="lightbox hidden" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <button class="lightbox-nav prev hidden" id="lightboxPrev" title="Previous (←)">‹</button>
    <img id="lightboxImg" src="" alt="" />
    <button class="lightbox-nav next hidden" id="lightboxNext" title="Next (→)">›</button>
    <div class="lightbox-caption" id="lightboxCaption"></div>
    <div class="lightbox-count" id="lightboxCount"></div>
  </div>

  <!-- Sign-in overlay — shown only when Google sign-in is required (auth enabled). -->
  <div class="auth-overlay hidden" id="authOverlay">
    <div class="auth-card">
      <div class="auth-mark">◐</div>
      <div class="auth-name">AI&nbsp;VIDEO&nbsp;STUDIO</div>
      <div class="auth-sub">Private studio — invited Google accounts only.</div>
      <button class="auth-google hidden" id="googleSignInBtn">
        <svg viewBox="0 0 18 18" width="17" height="17" aria-hidden="true"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 0 1 0-3.44V4.95H.96a9 9 0 0 0 0 8.1l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.46 3.44 1.35l2.58-2.58A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>
      <div class="auth-status" id="authStatus">Loading…</div>
      <button class="auth-signout hidden" id="authSignOut">Use a different account</button>
    </div>
  </div>

  <script src="/app.js?v=31" type="module"></script>
</body>
</html>
